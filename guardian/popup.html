<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardian Shield</title>
  <style>
    :root {
      --bg:       #07101e;
      --panel:    #0d1a2e;
      --border:   rgba(148,163,184,0.14);
      --text:     #e2eaf6;
      --muted:    #64748b;
      --accent:   #3b82f6;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --green:    #22c55e;
      --radius:   16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 400px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 0;
    }
    .header-icon { font-size: 22px; }
    .header-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Generic card ───────────────────────── */
    .card {
      margin: 12px 12px 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Current page status card ───────────── */
    #statusCard { position: relative; overflow: hidden; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .status-host {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
      flex: 1;
    }
    .status-badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-safe    { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .badge-warning { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-unsafe  { background: rgba(239,68,68,0.15);  color: #f87171; }

    /* Score gauge */
    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .score-num {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      min-width: 44px;
    }
    .score-track {
      flex: 1;
      height: 6px;
      background: rgba(148,163,184,0.12);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* Detection source tag */
    .source-tag {
      display: inline-block;
      font-size: 10px;
      color: var(--muted);
      background: rgba(148,163,184,0.08);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      margin-bottom: 10px;
    }

    /* Reasons list */
    .reasons-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 130px;
      overflow-y: auto;
    }
    .reason-item {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.45;
      padding: 5px 8px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      border-left: 2px solid rgba(148,163,184,0.2);
    }
    .reason-item.danger { border-left-color: #ef4444; color: #fca5a5; }
    .reason-item.warn   { border-left-color: #f59e0b; color: #fcd34d; }

    .api-checking {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0;
    }
    .spinner {
      width: 10px; height: 10px;
      border: 2px solid rgba(148,163,184,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-page {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 10px 0 4px;
    }

    /* ── Mode card ──────────────────────────── */
    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mode-btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 11px;
      padding: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      outline: none;
    }
    .mode-btn:hover { transform: translateY(-1px); }

    .btn-guided {
      background: rgba(245,158,11,0.12);
      color: #fbbf24;
      border-color: rgba(245,158,11,0.3);
    }
    .btn-guided.active {
      background: #f59e0b;
      color: #111;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.3);
    }
    .btn-enforce {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border-color: rgba(239,68,68,0.25);
    }
    .btn-enforce.active {
      background: #ef4444;
      color: #fff;
      box-shadow: 0 0 0 2px rgba(239,68,68,0.3);
    }

    .mode-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Activity log ───────────────────────── */
    .log-summary {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .log-item {
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 9px 11px;
    }
    .log-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .log-severity {
      font-size: 11px;
      font-weight: 800;
    }
    .sev-high   { color: #f87171; }
    .sev-medium { color: #fbbf24; }
    .sev-low    { color: #4ade80; }
    .log-time   { font-size: 10px; color: var(--muted); }
    .log-host   { font-size: 12px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .log-source-tag {
      display: inline-block;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .src-safebrowsing { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .src-virustotal   { background: rgba(168,85,247,0.15); color: #c084fc; }
    .src-heuristic    { background: rgba(148,163,184,0.1); color: #94a3b8; }
    .log-reasons-wrap { margin-top: 2px; }
    .log-reason-item {
      font-size: 11px;
      color: #64748b;
      line-height: 1.45;
      padding: 3px 0;
      border-bottom: 1px solid rgba(148,163,184,0.06);
    }
    .log-reason-item:last-child { border-bottom: none; }
    .log-reason-item.muted { color: #334155; }
    .log-extra { margin-top: 2px; }
    .see-more-btn {
      appearance: none;
      background: none;
      border: none;
      color: #3b82f6;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0 0;
      display: block;
    }
    .see-more-btn:hover { color: #60a5fa; }
    .show-all-btn {
      width: 100%;
      margin-top: 10px;
      appearance: none;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 10px;
      color: #60a5fa;
      font-size: 12px;
      font-weight: 600;
      padding: 9px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .show-all-btn:hover { background: rgba(59,130,246,0.15); }
    .log-empty {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 8px 0;
    }

    /* ── Footer ─────────────────────────────── */
    .footer {
      display: flex;
      gap: 8px;
      margin: 10px 12px 12px;
    }
    .btn-ghost {
      flex: 1;
      appearance: none;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .btn-ghost:hover {
      border-color: rgba(148,163,184,0.35);
      color: var(--text);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <div class="header-title">Guardian Shield</div>
      <div class="header-sub">VirusTotal · Google Safe Browsing · Heuristics</div>
    </div>
  </div>

  <!-- Current page status -->
  <div class="card" id="statusCard">
    <div class="card-label">Current Page</div>
    <div id="statusContent">
      <div class="no-page">Loading page status…</div>
    </div>
  </div>

  <!-- Mode -->
  <div class="card">
    <div class="card-label">Protection Mode</div>
    <div class="mode-buttons">
      <button id="guidedBtn"  class="mode-btn btn-guided">⚠️ Guided</button>
      <button id="enforceBtn" class="mode-btn btn-enforce">🚫 Enforcement</button>
    </div>
    <div id="modeDesc" class="mode-desc">Loading…</div>
  </div>

  <!-- Activity log -->
  <div class="card">
    <div class="card-label">Scan History</div>
    <div id="logSummary"  class="log-summary"></div>
    <div id="logList"     class="log-list"></div>
  </div>

  <!-- Footer buttons -->
  <div class="footer">
    <button id="clearBtn" class="btn-ghost">Clear history</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
